<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klaav</title>
    <!-- Import a nice display font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="app-container">
      <div id="panel">
        <div id="pinned-row"></div>
        <div id="tabs-view-container">
          <div id="loading-state" style="position: absolute; top: 50%; width: 100%; text-align: center; transform: translateY(-50%); opacity: 0.6; font-size: 13px; letter-spacing: 0.5px; z-index: 5;">Connecting...</div>
          <div id="tabs-view">
            <!-- Tab chips will be dynamically injected here -->
          </div>
        </div>
        
        <div id="settings-trigger">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </div>
        
        <div id="settings-panel">
          <label>
            <input type="checkbox" id="group-browser-cb" />
            Group by browser
          </label>
          <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 4px;">
            <label for="theme-select" style="font-size: 11px; opacity: 0.8;">Theme</label>
            <select id="theme-select" style="background: rgba(0,0,0,0.3); color: inherit; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 4px; outline: none; font-family: inherit;">
              <option value="glass">Glassmorphism (Default)</option>
              <option value="theme-neumorphism">Neumorphism</option>
              <option value="theme-cyberpunk">Cyberpunk</option>
              <option value="theme-eink">E-Ink</option>
              <option value="theme-aurora">Aurora</option>
              <option value="theme-win95">Windows 95</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
